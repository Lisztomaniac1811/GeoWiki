<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bates Motel Season 2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-loading">
    <div id="viewport" class="viewport">
      <div id="background-stage" class="background-stage"></div>
      <div id="overlay-stage" class="overlay-stage"></div>
      <div id="screen-root" class="screen-root"></div>

      <div class="orientation-card">
        <div class="orientation-title">Rotate Your Phone</div>
        <div class="orientation-copy">For the best motel experience, use landscape orientation.</div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>

</html>
